<!-- Standalone form fragment: no base.html extension -->
<div class="bg-white rounded-lg shadow-sm border border-gray-200 max-w-lg mx-auto">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-gray-900">New Return</h3>
        <button
            hx-get="/returns/"
            hx-target="#page-content"
            hx-swap="innerHTML"
            class="text-gray-400 hover:text-gray-600 transition-colors"
        >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <div class="px-6 py-4">
        <form
            hx-post="/returns/create"
            hx-target="#page-content"
            hx-swap="innerHTML"
            class="space-y-4"
        >
            <!-- Lot Reference -->
            <div>
                <label for="lot_ref" class="block text-sm font-medium text-gray-700 mb-1">Lot Reference <span class="text-red-500">*</span></label>
                <input
                    type="text"
                    id="lot_ref"
                    name="lot_ref"
                    required
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-primary-500 focus:border-primary-500"
                    placeholder="e.g. LOT-2025-001"
                />
            </div>

            <!-- Quantity -->
            <div>
                <label for="qty" class="block text-sm font-medium text-gray-700 mb-1">Quantity <span class="text-red-500">*</span></label>
                <input
                    type="number"
                    id="qty"
                    name="qty"
                    required
                    min="0.01"
                    step="0.01"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-primary-500 focus:border-primary-500"
                    placeholder="0.00"
                />
            </div>

            <!-- Reason -->
            <div>
                <label for="reason_id" class="block text-sm font-medium text-gray-700 mb-1">Reason <span class="text-red-500">*</span></label>
                <select
                    id="reason_id"
                    name="reason_id"
                    required
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-primary-500 focus:border-primary-500"
                >
                    <option value="">Select reason...</option>
                    {% for reason in reasons %}
                    <option value="{{ reason.id }}">{{ reason.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Condition -->
            <div>
                <label for="condition" class="block text-sm font-medium text-gray-700 mb-1">Condition</label>
                <input
                    type="text"
                    id="condition"
                    name="condition"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-primary-500 focus:border-primary-500"
                    placeholder="e.g. Damaged, Expired, Defective"
                />
            </div>

            <!-- Note -->
            <div>
                <label for="note" class="block text-sm font-medium text-gray-700 mb-1">Note</label>
                <textarea
                    id="note"
                    name="note"
                    rows="3"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-primary-500 focus:border-primary-500"
                    placeholder="Optional additional details..."
                ></textarea>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-end gap-3 pt-2">
                <button
                    type="button"
                    hx-get="/returns/"
                    hx-target="#page-content"
                    hx-swap="innerHTML"
                    class="px-4 py-2 rounded-lg text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors"
                >
                    Cancel
                </button>
                <button
                    type="submit"
                    class="inline-flex items-center gap-2 bg-primary-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-primary-700 transition-colors"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Create Return
                </button>
            </div>
        </form>
    </div>
</div>
