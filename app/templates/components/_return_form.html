<!-- Standalone form fragment: no base.html extension -->
<div class="bg-white rounded-xl shadow-sm border border-slate-200 max-w-lg mx-auto">
    <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 class="text-base font-semibold text-slate-900">Buat Return Baru</h3>
        <button hx-get="/returns/" hx-target="#page-content" hx-swap="innerHTML"
                class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <div class="px-5 py-4">
        <form hx-post="/returns/create" hx-target="#page-content" hx-swap="innerHTML" class="space-y-4">
            <!-- Lot Reference -->
            <div>
                <label for="lot_ref" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Lot Reference <span class="text-red-500">*</span>
                </label>
                <input type="text" id="lot_ref" name="lot_ref" required
                       class="w-full h-10 rounded-lg border border-slate-300 px-3 text-sm text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors"
                       placeholder="e.g. LOT-2025-001"/>
            </div>

            <!-- Quantity -->
            <div>
                <label for="qty" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Quantity <span class="text-red-500">*</span>
                </label>
                <input type="number" id="qty" name="qty" required min="0.01" step="0.01"
                       class="w-full h-10 rounded-lg border border-slate-300 px-3 text-sm text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors"
                       placeholder="0.00"/>
            </div>

            <!-- Reason -->
            <div>
                <label for="reason_id" class="block text-sm font-medium text-slate-700 mb-1.5">
                    Reason <span class="text-red-500">*</span>
                </label>
                <select id="reason_id" name="reason_id" required
                        class="w-full h-10 rounded-lg border border-slate-300 px-3 text-sm text-slate-900 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors">
                    <option value="">Pilih alasan...</option>
                    {% for reason in reasons %}
                    <option value="{{ reason.id }}">{{ reason.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Condition -->
            <div>
                <label for="condition" class="block text-sm font-medium text-slate-700 mb-1.5">Condition</label>
                <input type="text" id="condition" name="condition"
                       class="w-full h-10 rounded-lg border border-slate-300 px-3 text-sm text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors"
                       placeholder="e.g. Damaged, Expired"/>
            </div>

            <!-- Note -->
            <div>
                <label for="note" class="block text-sm font-medium text-slate-700 mb-1.5">Note</label>
                <textarea id="note" name="note" rows="3"
                          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors"
                          placeholder="Catatan opsional..."></textarea>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-end gap-2 pt-2">
                <button type="button" hx-get="/returns/" hx-target="#page-content" hx-swap="innerHTML"
                        class="px-4 py-2 rounded-lg text-sm font-medium text-slate-700 bg-slate-100 hover:bg-slate-200 transition-colors duration-150">
                    Batal
                </button>
                <button type="submit"
                        class="inline-flex items-center gap-1.5 bg-emerald-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 active:bg-emerald-800 transition-colors duration-150">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                    Buat Return
                </button>
            </div>
        </form>
    </div>
</div>
