<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Return Material Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#059669',
                            600: '#047857',
                            700: '#065f46',
                            800: '#064e3b',
                            900: '#022c22',
                        },
                    },
                }
            }
        }
    </script>
    <style>
        /* Base */
        body { font-family: 'Roboto', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* HTMX */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }

        /* Transitions */
        [data-toast] { animation: slideIn 0.25s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Focus ring */
        *:focus-visible { outline: 2px solid #059669; outline-offset: 2px; border-radius: 4px; }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="h-full bg-slate-50">

<div class="flex h-full">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 flex flex-col shadow-xl">
        <!-- Logo -->
        <div class="px-5 py-5 border-b border-slate-700/50">
            <a href="/" class="flex items-center gap-3">
                <div class="w-9 h-9 bg-brand-500 rounded-lg flex items-center justify-center shadow-lg shadow-brand-500/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                </div>
                <div>
                    <span class="text-sm font-bold text-white tracking-tight">Return Material</span>
                    <p class="text-[10px] text-slate-400 font-medium">Manager v0.1.0</p>
                </div>
            </a>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-3 py-4 space-y-1">
            <a href="/" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200
                {% if active_page == 'dashboard' %}
                    bg-brand-500/10 text-brand-400
                {% else %}
                    text-slate-400 hover:bg-slate-800 hover:text-slate-200
                {% endif %}">
                <svg class="w-5 h-5 flex-shrink-0 {% if active_page == 'dashboard' %}text-brand-400{% else %}text-slate-500 group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
                </svg>
                Dashboard
            </a>

            <a href="/returns/" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200
                {% if active_page == 'returns' %}
                    bg-brand-500/10 text-brand-400
                {% else %}
                    text-slate-400 hover:bg-slate-800 hover:text-slate-200
                {% endif %}">
                <svg class="w-5 h-5 flex-shrink-0 {% if active_page == 'returns' %}text-brand-400{% else %}text-slate-500 group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/>
                </svg>
                Return List
            </a>

            <a href="/reports/" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200
                {% if active_page == 'reports' %}
                    bg-brand-500/10 text-brand-400
                {% else %}
                    text-slate-400 hover:bg-slate-800 hover:text-slate-200
                {% endif %}">
                <svg class="w-5 h-5 flex-shrink-0 {% if active_page == 'reports' %}text-brand-400{% else %}text-slate-500 group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/>
                </svg>
                Reports
            </a>

            <a href="/berita-acara/" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200
                {% if active_page == 'berita_acara' %}
                    bg-brand-500/10 text-brand-400
                {% else %}
                    text-slate-400 hover:bg-slate-800 hover:text-slate-200
                {% endif %}">
                <svg class="w-5 h-5 flex-shrink-0 {% if active_page == 'berita_acara' %}text-brand-400{% else %}text-slate-500 group-hover:text-slate-300{% endif %}" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                </svg>
                Berita Acara
            </a>
        </nav>

        <!-- Footer -->
        <div class="px-4 py-4 border-t border-slate-700/50">
            <div class="flex items-center justify-between">
                <span class="text-xs text-slate-500 font-medium">Single User</span>
                <a href="/logout" class="group flex items-center gap-2 text-xs text-slate-500 hover:text-red-400 transition-colors" title="Logout">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
                    </svg>
                    <span class="group-hover:text-red-400">Logout</span>
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto">
        <!-- Top bar -->
        <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-10">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-semibold text-slate-900">{% block page_title %}{% endblock %}</h2>
                {% block header_actions %}{% endblock %}
            </div>
        </header>

        <!-- Page content -->
        <div class="p-6" id="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

<!-- Toast container -->
<div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

<!-- Toast helper -->
<script>
function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const icons = {
        success: '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>',
        error: '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>',
        info: '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>'
    };
    const colors = {
        success: 'bg-emerald-500 shadow-emerald-500/25',
        error: 'bg-red-500 shadow-red-500/25',
        info: 'bg-slate-700 shadow-slate-700/25'
    };
    const toast = document.createElement('div');
    toast.setAttribute('data-toast', '');
    toast.className = `pointer-events-auto flex items-center gap-2.5 ${colors[type] || colors.info} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium`;
    toast.innerHTML = `${icons[type] || icons.info}<span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.animation = 'fadeOut 0.2s ease-out forwards';
        setTimeout(() => toast.remove(), 200);
    }, 3500);
}

// HTMX after-request handler
document.body.addEventListener('htmx:afterRequest', function(e) {
    if (e.detail.xhr && e.detail.xhr.status >= 200 && e.detail.xhr.status < 300) {
        if (e.detail.requestConfig.verb === 'post' || e.detail.requestConfig.verb === 'delete') {
            showToast('Berhasil');
        }
    }
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
